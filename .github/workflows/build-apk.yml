name: Build APK

on:
  push:
    branches:
      - claude/android-weather-app-njkFk
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/BlankWeather-${{ github.run_number }}.apk
          cp app/build/outputs/apk/release/app-release.apk out/BlankWeather.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlankWeather-apk
          path: out/*.apk
          if-no-files-found: error

      - name: Publish rolling release
        if: github.ref == 'refs/heads/claude/android-weather-app-njkFk' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Blank Weather (latest)
          body: |
            Latest debug-signed APK built from `${{ github.ref_name }}` @ `${{ github.sha }}`.
            Install with `adb install BlankWeather.apk`, or download it on your phone and tap to install
            (you may need to allow installing from unknown sources for your browser).
          files: out/BlankWeather.apk
          prerelease: false
          make_latest: true
